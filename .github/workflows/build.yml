name: "build binaries"

on:
  workflow_dispatch:
    inputs:
      tagName:
        description: "tag to build"
        required: true
        default: "0.0.0"
  workflow_call:
    inputs:
      tagName:
        required: true
        type: string

# This is the example from the readme.
# On each push to the `release` branch it will create or update a GitHub release, build your app, and upload the artifacts to the release.

jobs:
  build:
    permissions:
      contents: write
      artifact-metadata: write
    timeout-minutes: 45

    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: "macos-latest" # for Arm based macs (M1 and above).
            arch: aarch64
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest" # for Intel based macs.
            arch: x86_64
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04" # for Tauri v1 you could replace this with ubuntu-20.04.
            arch: x86_64
            args: "--bundles appimage"
          - platform: "ubuntu-22.04" # for Tauri v1 you could replace this with ubuntu-20.04.
            arch: aarch64
            args: "--bundles appimage"
          - platform: "windows-latest"
            arch: x86_64
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          cache: true

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev build-essential

      - name: install frontend dependencies
        run: bun install

      - name: get version for windows
        id: sanitized-version
        run: |
          VERSION=${TAG_NAME#v}
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            VERSION=${VERSION%%-*}
          fi
          echo "config={\"version\":\"$VERSION\"}" >> $GITHUB_OUTPUT
        shell: bash
        env:
          TAG_NAME: ${{ inputs.tagName }}

      - name: import apple signing certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain-db
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN"
          security import certificate.p12 -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

      - name: resolve signing identity
        if: matrix.platform == 'macos-latest'
        run: |
          CERT_ID=$(security find-identity -v -p codesigning build.keychain-db \
            | awk -F'"' '{print $2}' | head -n1)
          if [ -z "$CERT_ID" ]; then
            echo "::error::no code signing identity found in keychain"
            exit 1
          fi
          echo "signing as: $CERT_ID"
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> $GITHUB_ENV

      - name: build binaries
        run: bun tauri build ${{ matrix.args }} --config '${{ steps.sanitized-version.outputs.config }}'
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
          TAG_NAME: ${{ inputs.tagName }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_API_SECRET: ${{ secrets.LASTFM_API_SECRET }}
          LIBREFM_API_KEY: ${{ secrets.LIBREFM_API_KEY }}
          LIBREFM_API_SECRET: ${{ secrets.LIBREFM_API_SECRET }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}

      - name: zip mac .app bundles
        if: matrix.platform == 'macos-latest' # This must match the platform value defined above.
        run: |
          find src-tauri/target -name "*.app" -type d | while read app; do
            base="${app%.app}"
            ditto -c -k --sequesterRsrc --keepParent "$app" "${base}-${{ matrix.arch }}.app.zip"
          done

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dotsong-artifacts-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/macos/*.app.zip
            src-tauri/target/release/dotsong.exe
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: cleanup keychain
        if: ${{ always() && matrix.platform == 'macos-latest' }}
        run: |
          security delete-keychain build.keychain-db 2>/dev/null || true
          rm -f certificate.p12

  release:
    needs: build
    uses: ./.github/workflows/release.yml
    secrets: inherit
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    with:
      tagName: ${{ inputs.tagName }}
