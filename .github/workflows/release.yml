name: create release

on:
  workflow_dispatch:
    inputs:
      tagName:
        description: "tag to build"
        required: true
        default: "0.0.0"
  workflow_call:
    inputs:
      tagName:
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: list artifacts
        run: find artifacts -type f | sort

      - name: sign release artifacts
        uses: sigstore/gh-action-sigstore-python@v3.4.0
        with:
          inputs: |
            artifacts/**/*.dmg
            artifacts/**/*.app.zip
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.AppImage

      - uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            artifacts/**/*.dmg
            artifacts/**/*.app.zip
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.AppImage

      - name: generate notes
        env:
          TAG_NAME: ${{ inputs.tagName }}
        run: |
          gh api \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/releases/generate-notes \
            -F tag_name="$TAG_NAME" \
            -q .body > notes.md
          bash .github/scripts/release-links.sh "${{ github.repository }}" "$TAG_NAME" artifacts/ >> notes.md

      - name: make release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tagName }}
        run: |
          if [[ $TAG_NAME =~ -[a-zA-Z] ]]; then
            PRERELEASE_FLAG="--prerelease"
          else
            PRERELEASE_FLAG=""
          fi
          gh release create $TAG_NAME $(find artifacts -path '*/release/bundle/*' -type f) --notes-file notes.md $PRERELEASE_FLAG -d
